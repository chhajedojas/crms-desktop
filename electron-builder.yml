appId: com.crms.app
productName: CRMS
copyright: Copyright © 2024 CRMS Development Team
electronVersion: 28.0.0

directories:
  output: dist
  buildResources: build/resources

files:
  - frontend/dist/**/*
  - backend/dist/**/*
  - shared/**/*
  - package.json

mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/resources/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/resources/entitlements.mac.plist
  entitlementsInherit: build/resources/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application needs camera access for document scanning
    - NSMicrophoneUsageDescription: Application needs microphone access for voice commands

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/resources/icons/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CRMS

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/resources/icons/icon.png
  category: Office

publish:
  provider: generic
  url: https://releases.crms.com/latest/

afterPack: ./build/scripts/afterPack.js
afterSign: ./build/scripts/afterSign.js
